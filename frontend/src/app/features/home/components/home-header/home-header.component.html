<header class="home-header" routerLink="/" style="cursor:pointer">
  <img class="header-bg" src="images/hero-banner.jpg" alt="" aria-hidden="true" />
  <div class="header-scrim" aria-hidden="true"></div>

  <!-- Left side branding -->
  <div class="header-left">
    <div class="header-login" (click)="$event.stopPropagation()">
      <app-login-button></app-login-button>
    </div>
    <div class="game-subtitle">
      <span class="subtitle-line">WHERE</span>
      <span class="subtitle-line">WINDS</span>
      <span class="subtitle-line">MEET</span>
      <img src="icons/seal.png" alt="Seal" class="seal-img seal-img--small" />
    </div>
  </div>

  <!-- Center title -->
  <div class="header-center">
    <div class="guild-label">
      <span class="divider-line"></span>
      <span class="guild-text">GUILD</span>
      <span class="divider-line"></span>
    </div>
    <div class="game-title-wrapper">
      <h1 class="game-title">
        <span class="title-game">Game</span><span class="title-vn">VN</span>
      </h1>
      <img src="icons/seal.png" alt="Seal" class="seal-img seal-img--title" />
    </div>
    <div class="game-motto">
      <span class="divider-line short"></span>
      UID: 10242973
      <span class="divider-line short"></span>
      Discord: https://discord.gg/gamevn
      <span class="divider-line short"></span>
    </div>
  </div>

  <div class="header-right">
    <div class="header-register" (click)="$event.stopPropagation()">
      <app-register-button></app-register-button>
    </div>
  </div>
</header>
