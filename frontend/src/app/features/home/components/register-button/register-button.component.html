@if ((authResolved$ | async) && !(currentUser$ | async) && config.isOn('feature.register')) {
  <div class="register-wrapper">
    <button
      type="button"
      class="register-btn"
      (click)="openForm()"
      title="Secure a place in our GvG formation and access to vaults!"
    >
      <span class="register-main">REGISTER</span>
    </button>
  </div>
}
