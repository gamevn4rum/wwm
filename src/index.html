<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!--
    Content-Security-Policy: defense-in-depth to limit the blast radius of any
    HTML injection (e.g. via the Events description). Test the live app after
    changing this — youtube-player, Discord CDN avatars and Google Fonts all
    depend on the allow-lists below. 'unsafe-inline' for script is required by
    the inline SPA-restore script and Angular's runtime; tighten with hashes if
    you later remove inline scripts.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://www.youtube.com https://www.youtube-nocookie.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https://cdn.discordapp.com https://*.discordapp.com https://i.ytimg.com https://i.ibb.co;
    connect-src 'self' https://discord.com;
    frame-src https://www.youtube.com https://www.youtube-nocookie.com;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  ">
  <title>GameVN・Where Winds Meet</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta name="theme-color" content="#f6f0e3">
  <meta name="description" content="Official companion for the GameVN Where Winds Meet guild — roster, schedule, match history and footage.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    // Restore path encoded by 404.html for GitHub Pages SPA routing
    (function () {
      var params = new URLSearchParams(window.location.search);
      var p = params.get('p');
      if (p) {
        var parts = p.split('&');
        var path = '/' + decodeURIComponent(parts[0]);
        var query = parts.length > 1 ? '?' + parts.slice(1).join('&') : '';
        window.history.replaceState(null, null, path + query + window.location.hash);
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
