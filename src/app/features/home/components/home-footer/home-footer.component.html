<footer class="home-footer">
  <!-- Miscellaneous label -->
  <div class="misc-label">
    <span class="divider-line"></span>
    <span class="misc-title">MISCELLANEOUS</span>
    <span class="divider-line"></span>
  </div>

  <!-- Action buttons row -->
  <div class="misc-actions">
    <a class="misc-btn" routerLink="/schedule" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
      <span class="misc-icon">
        <img src="icons/icon-schedule.png" alt="Schedule" class="misc-icon-img" />
      </span>
      <span class="misc-text">
        <span class="misc-main">SCHEDULE</span>
        <span class="misc-sub">UPCOMING EVENTS</span>
      </span>
    </a>

    @if (currentUser$ | async; as user) {
      @if (user.fp) {
        <a class="misc-btn" routerLink="/formation" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
          <span class="misc-icon">
            <img src="icons/icon-formation.png" alt="Formation" class="misc-icon-img" />
          </span>
          <span class="misc-text">
            <span class="misc-main">FORMATION</span>
            <span class="misc-sub">VIEW OUR LINEUPS</span>
          </span>
        </a>
      }

        <a class="misc-btn" routerLink="/match-history" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
          <span class="misc-icon">
            <img src="icons/icon-match-history.png" alt="Match History" class="misc-icon-img" />
          </span>
          <span class="misc-text">
            <span class="misc-main">MATCH HISTORY</span>
            <span class="misc-sub">PAST BATTLES</span>
          </span>
        </a>

      @if (user.ftp) {
        <a class="misc-btn" routerLink="/footages" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
          <span class="misc-icon">
            <img src="icons/icon-footages.png" alt="Footages" class="misc-icon-img" />
          </span>
          <span class="misc-text">
            <span class="misc-main">FOOTAGES</span>
            <span class="misc-sub">HIGHLIGHTS &amp; CLIPS</span>
          </span>
        </a>
      }
    }
  </div>

  <!-- Bottom tagline -->
  <div class="footer-tagline">
    <span class="divider-line short"></span>
    <span class="tagline-text">Where Players・Become Gamers</span>
    <img src="icons/seal.png" alt="Seal" class="seal-img" />
    <span class="divider-line short"></span>
  </div>
</footer>
