name: Sync Player Stats

# Enriches the roster with in-game stats/gear pulled from wwmdb.vlt.fyi, matched
# by IGN. Runs daily (stats change slowly, and this hits a third party's relay —
# see scripts/fetch-player-stats.js for the Route-A / PII caveats). Self-contained:
# re-fetches the roster, looks up each member, encrypts, commits, triggers deploy.

on:
  schedule:
    # Once a day at 03:59 ICT (UTC+7) = 20:59 UTC. Deliberately not hourly —
    # be gentle on wwmdb (this run also syncs the InnerWays and Suits/Sets
    # catalogues, ~160 extra detail calls on top of the per-member lookups).
    - cron: '59 20 * * *'
  workflow_dispatch:        # manual trigger

permissions:
  contents: write
  actions: write            # needed to trigger deploy.yml below

# Never overlap with the hourly sheet sync's commit-and-push.
concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  sync-player-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch sheet data (roster source of truth)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: node scripts/fetch-data.js

      - name: Fetch player stats from wwmdb
        env:
          # Optional override if wwmdb rotates the token embedded in their bundle.
          WWMDB_TOKEN: ${{ secrets.WWMDB_TOKEN }}
        run: node scripts/fetch-player-stats.js

      - name: Encrypt sensitive data files
        env:
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
        run: node scripts/encrypt-data.js

      - name: Commit and push updated data
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm --cached data/match-history.json --ignore-unmatch
          git rm --cached data/members.json --ignore-unmatch
          git rm --cached data/player-stats.json --ignore-unmatch
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: sync player stats [skip ci]"

          # Tolerate main advancing between checkout and push (e.g. the hourly
          # sheet sync landing meanwhile): rebase and retry on non-fast-forward.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push rejected (attempt $attempt/5) — rebasing onto latest main and retrying…"
            git pull --rebase origin main
          done
          echo "::error::Failed to push updated data after 5 attempts"
          exit 1

      - name: Trigger deploy workflow
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
