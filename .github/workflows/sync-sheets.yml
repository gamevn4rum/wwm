name: Sync Google Sheets Data

on:
  schedule:
    # Runs once per hour, on the hour (UTC).
    # To change the cadence, edit the cron expression below.
    # (GitHub Actions does not support dynamic cron from repository variables.)
    - cron: '0 * * * *'
  workflow_dispatch:        # manual trigger

permissions:
  contents: write
  actions: write            # needed to trigger deploy.yml below

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch sheet data
        env:
          # Service account auth — the sheet is private and shared only with
          # the service account's client_email (Viewer).
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: node scripts/fetch-data.js

      - name: Encrypt sensitive data files
        env:
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
        run: node scripts/encrypt-data.js

      - name: Commit and push updated data
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm --cached data/match-history.json --ignore-unmatch
          git rm --cached data/members.json --ignore-unmatch
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: sync sheet data [skip ci]"

          # Push, but tolerate main advancing between checkout and push (a
          # concurrent run, or a manual push landing meanwhile). On a rejected
          # non-fast-forward, rebase our commit onto the latest main and retry.
          # This commit only ever touches data/ (regenerated deterministically),
          # so the rebase applies cleanly against unrelated changes.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push rejected (attempt $attempt/5) — rebasing onto latest main and retrying…"
            git pull --rebase origin main
          done
          echo "::error::Failed to push updated data after 5 attempts"
          exit 1

      # Building/deploying now lives in deploy.yml. A push made with the
      # default GITHUB_TOKEN does NOT trigger other workflows' `push`
      # events, so trigger it explicitly instead of relying on that push.
      - name: Trigger deploy workflow
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
